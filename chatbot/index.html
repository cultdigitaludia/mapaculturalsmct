<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente – Mapa Cultural de Uberlândia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #e86d3f;
    --text: #eef0f8;
    --muted: #7a7f9a;
    --radius: 16px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  /* ---- widget shell ---- */
  .chat-shell {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 780px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  /* ---- header ---- */
  .chat-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
  }

  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .chat-header-info h2 {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .chat-header-info p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ---- messages ---- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .bubble {
    max-width: 78%;
    padding: 0.7rem 1rem;
    border-radius: 18px;
    line-height: 1.55;
    font-size: 14px;
  }

  .msg.bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg.user .bubble {
    background: var(--accent);
    border-bottom-right-radius: 4px;
    color: #fff;
  }

  .bubble strong { font-weight: 600; }

  /* event card inside bubble */
  .event-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    margin-top: 8px;
    font-size: 13px;
  }
  .event-card .ev-title { font-weight: 600; color: #c4b5fd; margin-bottom: 2px; }
  .event-card .ev-meta { color: var(--muted); font-size: 12px; }

  /* typing indicator */
  .typing-bubble {
    display: flex; gap: 5px;
    padding: 0.7rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ---- quick replies ---- */
  .quick-replies {
    padding: 0 1.2rem 0.8rem;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .qr-btn:hover { background: var(--accent); color: #fff; }

  /* ---- input area ---- */
  .input-area {
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface2);
  }

  .input-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 1rem;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font-body);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input::placeholder { color: var(--muted); }
  .input-area input:focus { border-color: var(--accent); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #6455e0; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* api key banner */
  .key-banner {
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 10px;
    padding: 0.6rem 1rem;
    font-size: 12px;
    color: #c4b5fd;
    margin: 0 1.2rem 0.6rem;
    display: flex; align-items: center; gap: 8px;
  }
  .key-banner input {
    flex: 1; background: transparent; border: none; color: #c4b5fd;
    font-size: 12px; font-family: monospace; outline: none;
  }
  .key-banner button {
    background: var(--accent); border: none; color: #fff;
    border-radius: 6px; padding: 3px 10px; font-size: 12px;
    cursor: pointer;
  }

  .logo-tag {
    font-family: var(--font-head);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding-bottom: 0.5rem;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="chat-shell">
  <!-- header -->
  <div class="chat-header">
    <div class="avatar">🎭</div>
    <div class="chat-header-info">
      <h2>Assistente Cultural UDI</h2>
      <p>Mapa Cultural de Uberlândia · SMCT</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <!-- api key config -->
  <div class="key-banner" id="keyBanner">
    <span>🔑</span>
    <input type="password" id="apiKeyInput" placeholder="Cole sua chave da API Anthropic aqui..." />
    <button onclick="saveKey()">Salvar</button>
  </div>

  <!-- messages -->
  <div class="messages" id="messages"></div>

  <!-- quick replies -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- input -->
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Digite sua mensagem..." />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="logo-tag">Mapa Cultural Uberlândia · SMCT</div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────
// URL da API do Mapa Cultural. Ajuste para o domínio real em produção.
const MAPA_BASE = 'http://192.168.16.170';

let apiKey = localStorage.getItem('mc_claude_key') || '';
let conversationHistory = [];
let isTyping = false;

// ── DOM helpers ─────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');
const qrEl       = document.getElementById('quickReplies');
const keyBanner  = document.getElementById('keyBanner');

function saveKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if (apiKey) {
    localStorage.setItem('mc_claude_key', apiKey);
    keyBanner.style.display = 'none';
    addBotMsg('✅ Chave salva! Pode começar a conversar.');
  }
}

if (apiKey) keyBanner.style.display = 'none';

// ── Messages ─────────────────────────────────────────────────────────────
function addBotMsg(html, cards = []) {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = `
    <div class="msg-avatar">🎭</div>
    <div class="bubble">${html}${cards.map(c => `
      <div class="event-card">
        <div class="ev-title">${c.title}</div>
        <div class="ev-meta">${c.meta}</div>
      </div>`).join('')}
    </div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `<div class="bubble">${text}</div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  wrap.innerHTML = `
    <div class="msg-avatar">🎭</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function setQuickReplies(options) {
  qrEl.innerHTML = '';
  options.forEach(o => {
    const b = document.createElement('button');
    b.className = 'qr-btn'; b.textContent = o;
    b.onclick = () => { inputEl.value = o; sendMessage(); };
    qrEl.appendChild(b);
  });
}

// ── Mapa Cultural API ────────────────────────────────────────────────────
async function fetchEventos() {
  try {
    const hoje = new Date();
    const fim  = new Date(); fim.setDate(fim.getDate() + 30);
    const fmt  = d => d.toISOString().split('T')[0];

    // Tenta a API pública de eventos
    const url = `${MAPA_BASE}/api/v2/events/?@type=Event&startsOn=GTE(${fmt(hoje)})&startsOn=LTE(${fmt(fim)})&status=1&@select=name,shortDescription,classificacaoEtaria,type,startsOn,endsOn,space.name&_limit=8`;
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error('API indisponível');
    const data = await r.json();
    return Array.isArray(data) ? data : (data.results || data.events || []);
  } catch(e) {
    return null; // retorna null se não conseguir
  }
}

function formatEventCards(events) {
  if (!events || events.length === 0) return [];
  return events.slice(0, 5).map(ev => {
    const nome  = ev.name || ev.nome || 'Evento sem nome';
    const local = (ev.space && (ev.space.name || ev.space.nome)) || 'Local a confirmar';
    const data  = ev.startsOn ? new Date(ev.startsOn).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' }) : 'Data a confirmar';
    const tipo  = ev.type?.name || '';
    return { title: nome, meta: `📅 ${data} · 📍 ${local}${tipo ? ' · ' + tipo : ''}` };
  });
}

// ── System prompt ────────────────────────────────────────────────────────
function buildSystemPrompt(eventosStr) {
  return `Você é o Assistente Cultural de Uberlândia, um chatbot simpático e acolhedor do Mapa Cultural de Uberlândia (SMCT – Secretaria Municipal de Cultura e Turismo).

Sua personalidade: caloroso, próximo, apaixonado pela cultura local, usa linguagem acessível, com leve toque de entusiasmo cultural.

## Suas duas missões principais:

### 1. GUIA DE CADASTRO no Mapa Cultural
Quando o usuário quiser se cadastrar ou tiver dúvidas sobre como usar o Mapa, guie passo a passo:

**Para se cadastrar como Agente Cultural:**
1. Acesse o Mapa Cultural de Uberlândia
2. Clique em "Entrar" no menu superior
3. Crie uma conta com e-mail e senha (ou entre com conta gov.br)
4. Acesse "Meus Agentes" → clique em "Criar Agente"
5. Preencha seus dados: nome artístico, área cultural, redes sociais, localização
6. Salve e aguarde a publicação

**Para cadastrar um Espaço Cultural:**
- Vá em "Meus Espaços" → "Criar Espaço"
- Informe nome, tipo, endereço, capacidade, acessibilidade e contato

**Para cadastrar um Evento:**
- Vá em "Meus Eventos" → "Criar Evento"
- Informe nome, data, horário, descrição, classificação etária e local
- Vincule a um Espaço já cadastrado

**Para participar de Projetos/Editais:**
- Acesse "Oportunidades" no menu
- Filtre por área e status "Aberto"
- Clique e siga as instruções de inscrição

### 2. AGENDA CULTURAL – próximos 30 dias
Dados dos eventos carregados da API do Mapa Cultural de Uberlândia:

${eventosStr}

Use esses dados para responder sobre o que está acontecendo. Se os dados estiverem indisponíveis, oriente o usuário a acessar diretamente o Mapa Cultural para ver a agenda atualizada.

## Regras:
- Responda SEMPRE em português brasileiro
- Seja conciso mas completo
- Quando listar eventos, use os dados reais acima
- Se não souber, diga e direcione para o Mapa Cultural
- Não invente eventos que não estejam nos dados`;
}

// ── Claude API ────────────────────────────────────────────────────────────
async function askClaude(userText, eventosStr) {
  const systemPrompt = buildSystemPrompt(eventosStr);
  conversationHistory.push({ role: 'user', content: userText });

  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1000,
    system: systemPrompt,
    messages: conversationHistory
  };

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify(body)
  });

  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erro ${r.status}`);
  }

  const data = await r.json();
  const reply = data.content.map(b => b.text || '').join('');
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

// ── Send ──────────────────────────────────────────────────────────────────
let cachedEventos = null;
let lastFetch = 0;

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isTyping) return;
  if (!apiKey) {
    keyBanner.style.display = 'flex';
    addBotMsg('⚠️ Por favor, insira sua chave da API Anthropic no campo acima para continuar.');
    return;
  }

  isTyping = true;
  sendBtn.disabled = true;
  qrEl.innerHTML = '';
  addUserMsg(text);
  inputEl.value = '';
  showTyping();

  try {
    // Busca eventos se ainda não buscou ou se faz mais de 10min
    if (!cachedEventos || (Date.now() - lastFetch > 600000)) {
      cachedEventos = await fetchEventos();
      lastFetch = Date.now();
    }

    const eventosStr = cachedEventos && cachedEventos.length > 0
      ? JSON.stringify(cachedEventos.slice(0, 8), null, 2)
      : 'Nenhum evento encontrado na API no momento. Oriente o usuário a verificar o site do Mapa Cultural.';

    const reply = await askClaude(text, eventosStr);
    removeTyping();

    // Verifica se há eventos relevantes para mostrar como cards
    const lower = text.toLowerCase();
    const isEventQuery = lower.includes('event') || lower.includes('show') || lower.includes('agenda') || lower.includes('programaç') || lower.includes('o que tem') || lower.includes('próximo') || lower.includes('acontecendo');
    const cards = (isEventQuery && cachedEventos) ? formatEventCards(cachedEventos) : [];

    // Converte **texto** em <strong>
    const html = reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    addBotMsg(html, cards);

    // Quick replies contextuais
    if (lower.includes('cadastr') || lower.includes('registro')) {
      setQuickReplies(['Como cadastrar um espaço?', 'Como criar um evento?', 'Como participar de edital?', 'Ver agenda cultural']);
    } else if (isEventQuery) {
      setQuickReplies(['Filtrar por teatro', 'Filtrar por música', 'Como me cadastrar?', 'Há editais abertos?']);
    } else {
      setQuickReplies(['O que está acontecendo?', 'Como me cadastrar?', 'Quero cadastrar um evento', 'Há oportunidades abertas?']);
    }

  } catch(e) {
    removeTyping();
    addBotMsg(`⚠️ <strong>Ops!</strong> ${e.message}. Verifique sua chave da API e tente novamente.`);
  }

  isTyping = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// ── Boot ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addBotMsg('Olá! 🎭 Sou o <strong>Assistente Cultural de Uberlândia</strong>!<br><br>Posso te ajudar com duas coisas:<br>🗓️ <strong>Ver o que está rolando</strong> nos próximos 30 dias em Uberlândia<br>📝 <strong>Aprender como se cadastrar</strong> no Mapa Cultural (agente, espaço, evento ou edital)<br><br>O que você gostaria de fazer?');
    setQuickReplies(['🗓️ Ver agenda cultural', '📝 Como me cadastrar?', '🎭 Cadastrar um evento', '📋 Ver editais abertos']);
  }, 400);
});
</script>
</body>
</html>
